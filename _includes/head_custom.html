<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16x16.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
{% if page.url == "/profile/" %}
<link rel="stylesheet" href="{{ '/profile/stylesheet.css' | relative_url }}">
{% endif %}

<script>
  (function () {
    var storageKey = "jtd-color-mode";
    var modes = ["system", "light", "dark"];
    var mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

    function storedMode() {
      try {
        var mode = window.localStorage.getItem(storageKey);
        return modes.indexOf(mode) === -1 ? "system" : mode;
      } catch (error) {
        return "system";
      }
    }

    function resolvedTheme(mode) {
      return mode === "system" ? (mediaQuery.matches ? "dark" : "light") : mode;
    }

    function setTheme(theme) {
      var stylesheet = document.querySelector('link[rel="stylesheet"][href*="just-the-docs-"]:not(#jtd-head-nav-stylesheet)');
      if (stylesheet) {
        stylesheet.setAttribute("href", "{{ '/assets/css/just-the-docs-' | relative_url }}" + theme + ".css");
      }
      document.documentElement.setAttribute("data-theme", theme);
    }

    function syncControls(mode) {
      document.querySelectorAll("[data-theme-mode]").forEach(function (button) {
        button.setAttribute("aria-pressed", String(button.getAttribute("data-theme-mode") === mode));
      });
    }

    function applyMode(mode, save) {
      var safeMode = modes.indexOf(mode) === -1 ? "system" : mode;
      if (save) {
        try {
          window.localStorage.setItem(storageKey, safeMode);
        } catch (error) {}
      }
      document.documentElement.setAttribute("data-theme-mode", safeMode);
      setTheme(resolvedTheme(safeMode));
      syncControls(safeMode);
    }

    window.siteTheme = {
      applyMode: applyMode,
      currentMode: storedMode
    };

    applyMode(storedMode(), false);

    if (mediaQuery.addEventListener) {
      mediaQuery.addEventListener("change", function () {
        if (storedMode() === "system") {
          applyMode("system", false);
        }
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      syncControls(storedMode());
      document.querySelectorAll("[data-theme-mode]").forEach(function (button) {
        button.addEventListener("click", function () {
          applyMode(button.getAttribute("data-theme-mode"), true);
        });
      });
    });
  })();
</script>

<script>
  (function () {
    var storageKey = "jtd-sidebar-collapsed";

    /* Apply the stored state before first paint so the sidebar does not flash open. */
    try {
      if (window.localStorage.getItem(storageKey) === "true") {
        document.documentElement.setAttribute("data-sidebar", "collapsed");
      }
    } catch (error) {}

    function isCollapsed() {
      return document.documentElement.getAttribute("data-sidebar") === "collapsed";
    }

    document.addEventListener("DOMContentLoaded", function () {
      var toggle = document.getElementById("sidebar-toggle");
      if (!toggle) {
        return;
      }

      function syncButton() {
        toggle.setAttribute("aria-expanded", String(!isCollapsed()));
      }
      syncButton();

      toggle.addEventListener("click", function () {
        var collapsed = !isCollapsed();
        if (collapsed) {
          document.documentElement.setAttribute("data-sidebar", "collapsed");
        } else {
          document.documentElement.removeAttribute("data-sidebar");
        }
        try {
          window.localStorage.setItem(storageKey, String(collapsed));
        } catch (error) {}
        syncButton();
      });
    });
  })();
</script>

{% if page.math %}
<script>
  window.MathJax = {
    tex: {
      inlineMath: [["$", "$"], ["\\(", "\\)"]],
      displayMath: [["$$", "$$"], ["\\[", "\\]"]]
    },
    options: {
      skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
    }
  };
</script>
<script async id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
{% endif %}
